# Copilot Addon for Service 'api'
# Grants the ECS Execution Role permission to pull the YouTube Cookies secret from Secrets Manager.

Parameters:
  App:
    Type: String
  Env:
    Type: String
  Name:
    Type: String

Resources:
  # Adding a 'Policy' resource with 'ExecutionRolePolicy' in its name 
  # tells Copilot to automatically attach it to the ECS Execution Role.
  YouTubeCookiesAccessExecutionRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${App}-${Env}-${Name}-YouTubeCookiesAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - "arn:aws:secretsmanager:ap-south-1:347038623936:secret:brand-guardian/youtube-cookies-b64-Ercp1F"
      Roles:
        - !Ref ExecutionRole

  # Also granting it to the TaskRole (runtime access) just in case the app needs to read it directly.
  YouTubeCookiesAccessTaskRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${App}-${Env}-${Name}-YouTubeCookiesAccessTask
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - "arn:aws:secretsmanager:ap-south-1:347038623936:secret:brand-guardian/youtube-cookies-b64-Ercp1F"
      Roles:
        - !Ref TaskRole
